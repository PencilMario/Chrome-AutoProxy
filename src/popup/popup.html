<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome AutoProxy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <div class="signal-grid" aria-hidden="true"></div>

      <header class="masthead">
        <div class="brand-lockup">
          <span class="status-dot"></span>
          <div>
            <p class="eyebrow">路由控制台</p>
            <h1>AutoProxy</h1>
          </div>
        </div>
        <label class="switch" title="启用代理控制">
          <input id="enabledToggle" type="checkbox" aria-label="启用代理">
          <span aria-hidden="true"></span>
        </label>
      </header>

      <section class="status-panel" aria-live="polite">
        <span class="panel-label">系统状态</span>
        <p id="statusText">正在加载</p>
      </section>

      <section class="site-panel" aria-live="polite">
        <div class="panel-row">
          <span class="panel-label">当前网站</span>
          <strong id="currentHost">正在加载</strong>
        </div>
        <div class="route-display">
          <strong id="routeLabel">正在判断</strong>
          <span id="routeDetail">-</span>
        </div>
        <div class="rule-actions">
          <button id="addDirectRule" class="compact-action" type="button">加入直连</button>
          <button id="addProxyRule" class="compact-action" type="button">加入强制代理</button>
        </div>
      </section>

      <section class="speed-panel">
        <div class="panel-row">
          <span class="panel-label">当前网络速度</span>
          <button id="toggleSamples" class="mini-action" type="button" aria-expanded="false">查看样本</button>
        </div>
        <strong id="networkSpeed">暂无数据</strong>
        <span id="speedHint">仅统计代理请求</span>
        <div id="sampleList" class="sample-list" hidden></div>
      </section>

      <section class="field">
        <div class="field-label">
          <label for="proxySelect">代理配置</label>
          <span>当前路由</span>
        </div>
        <div class="select-wrap">
          <select id="proxySelect"></select>
        </div>
      </section>

      <section class="summary" aria-label="配置摘要">
        <div class="metric">
          <span class="metric-mark"></span>
          <strong id="proxyCount">0</strong>
          <span>配置</span>
        </div>
        <div class="metric">
          <span class="metric-mark"></span>
          <strong id="ruleCount">0</strong>
          <span>规则</span>
        </div>
      </section>

      <button id="openOptions" type="button">
        <span>打开设置</span>
        <span aria-hidden="true">-></span>
      </button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
